services:
  web-api:
    build: .
    deploy:
      replicas: 3
    environment:
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=ProductDb;User Id=sa;Password=YourPassword123;TrustServerCertificate=True
      - ConnectionStrings__Redis=redis:6379
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./scalelab-frontend
    ports:
      - "3000:3000"
    environment:
      - INTERNAL_API_URL=http://gateway
    depends_on:
      - gateway

  gateway:
    build:
      context: .
      dockerfile: ScaleLab.Gateway/Dockerfile
    ports:
      - "5000:8080"
    depends_on:
      - web-api

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourPassword123
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourPassword123' -Q 'SELECT 1' -b -C"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
