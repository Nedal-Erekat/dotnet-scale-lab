name: Frontend Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scalelab-frontend/**'
      - '.github/workflows/test-frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'scalelab-frontend/**'
      - '.github/workflows/test-frontend.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scalelab-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: scalelab-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test
