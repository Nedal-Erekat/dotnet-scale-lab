name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Install .NET 9 SDK
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # 3. Restore NuGet packages for the entire solution
      - name: Restore dependencies
        run: dotnet restore

      # 4. Build in Release configuration — treats warnings as errors
      - name: Build
        run: dotnet build --no-restore -c Release

      # 5. Run unit tests
      - name: Test
        run: dotnet test --no-restore --no-build -c Release

      # 6. Validate docker-compose.yml syntax and service definitions
      - name: Validate docker-compose config
        run: docker compose config --quiet

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scalelab-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: scalelab-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
