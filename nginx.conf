events {}

http {
    # Docker registers each replica under its own container hostname in addition to
    # the shared service name. Listing all three explicitly gives Nginx a real
    # round-robin upstream pool with connection reuse — no DNS TTL hacks needed.
    # Container names follow docker-compose's default pattern:
    #   <project>-<service>-<replica>  (project = directory name = dotnet-scale-lab)
    upstream api_servers {
        server dotnet-scale-lab-web-api-1:8080;
        server dotnet-scale-lab-web-api-2:8080;
        server dotnet-scale-lab-web-api-3:8080;
        keepalive 32;
    }

    server {
        listen 80;

        location / {
            proxy_pass              http://api_servers;
            proxy_http_version      1.1;
            proxy_set_header        Connection        "";
            proxy_set_header        Host              $host;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto $scheme;
            proxy_connect_timeout   5s;
            proxy_read_timeout      30s;
            proxy_next_upstream     error timeout http_502 http_503;
        }
    }
}
