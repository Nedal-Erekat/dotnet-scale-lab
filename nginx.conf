events {}

http {
    # 127.0.0.11 is Docker's embedded DNS. valid=60s means one re-resolution per
    # minute; shorter TTLs cause a thundering herd (all VUs need a new TCP connection
    # to the new IP simultaneously), which produces 502 spikes every TTL cycle.
    resolver 127.0.0.11 valid=60s;

    server {
        listen 80;

        location / {
            # A variable in proxy_pass forces Nginx to use the resolver above.
            # A static upstream block resolves once at startup and never re-resolves,
            # so all traffic stays pinned to whichever container answered first.
            set $upstream http://web-api:8080;

            proxy_pass              $upstream;
            proxy_http_version      1.1;
            proxy_set_header        Connection        "";
            proxy_set_header        Host              $host;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto $scheme;
            proxy_connect_timeout   5s;
            proxy_read_timeout      30s;
            proxy_next_upstream     error timeout http_502 http_503;
        }
    }
}
